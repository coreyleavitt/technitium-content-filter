<%inherit file="base.html"/>
<%def name="title()">Profiles</%def>
<script id="page-data" type="application/json">${json.dumps({"profiles": config.get("profiles", {}), "services": services, "scheduleAllDay": config.get("scheduleAllDay", True), "blockLists": config.get("blockLists", [])})}</script>

<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">Profiles</h1>
        <button onclick="openProfileModal()"
            class="inline-flex justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
            Add Profile
        </button>
    </div>

    <div id="profilesList"></div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="relative z-10 hidden" aria-modal="true">
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
    <div class="fixed inset-0 z-10 overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 sm:items-center">
            <div class="relative transform overflow-hidden rounded-lg bg-white px-4 pb-4 pt-5 shadow-xl sm:my-8 sm:w-full sm:max-w-2xl sm:p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4" id="modalTitle">Add Profile</h3>
                <form id="profileForm" class="space-y-4">
                    <input type="hidden" id="originalName" value="">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Name</label>
                        <input type="text" id="profileName" required
                            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Description</label>
                        <input type="text" id="profileDesc"
                            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Blocked Services</label>
                        <div id="servicesCheckboxes" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto"></div>
                    </div>

                    <!-- DNS Blocklists (checkboxes referencing global list) -->
                    <div id="blocklistCheckboxesSection">
                        <label class="block text-sm font-medium text-gray-700 mb-2">DNS Blocklists</label>
                        <p class="text-xs text-gray-500 mb-2">Select which global blocklists apply to this profile. <a href="${base_path}/filters/blocklists" class="text-indigo-600 hover:text-indigo-500">Manage blocklists</a></p>
                        <div id="blocklistCheckboxes" class="space-y-1 max-h-32 overflow-y-auto"></div>
                    </div>

                    <!-- Schedule -->
                    <div>
                        <label class="flex items-center space-x-2 mb-2">
                            <input type="checkbox" id="enableSchedule"
                                class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                                onchange="document.getElementById('scheduleGrid').classList.toggle('hidden')">
                            <span class="text-sm font-medium text-gray-700">Blocking Schedule</span>
                        </label>
                        <div id="scheduleGrid" class="hidden space-y-2">
                            <p class="text-xs text-gray-500">Select which days blocking is active. Uncheck 24hr to set specific hours.</p>
                            <div id="scheduleDays"></div>
                        </div>
                    </div>

                    <div class="flex justify-end space-x-3 pt-4">
                        <button type="button" onclick="closeProfileModal()"
                            class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">
                            Cancel
                        </button>
                        <button type="submit"
                            class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<%def name="scripts()">
<script src="${base_path}/static/js/profiles.js"></script>
</%def>
