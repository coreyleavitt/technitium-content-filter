name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - no
      prerelease:
        description: "Pre-release tag"
        required: true
        type: choice
        default: "no"
        options:
          - "no"
          - alpha
          - beta
          - rc

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  prepare-version:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute version
        id: version
        run: |
          # Read current version from .csproj
          CURRENT=$(grep -oP '<Version>\K[^<]+' src/ContentFilter/ContentFilter.csproj)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT%%-*}"

          if [ "${{ inputs.bump }}" != "no" ]; then
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
          fi

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          if [ "${{ inputs.prerelease }}" != "no" ]; then
            VERSION="${VERSION}-${{ inputs.prerelease }}.1"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Update version in .csproj and pyproject.toml
        if: inputs.bump != 'no'
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" \
            src/ContentFilter/ContentFilter.csproj
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' \
            web/pyproject.toml

      - name: Commit version bump
        id: commit
        if: inputs.bump != 'no'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const csprojContent = fs.readFileSync('src/ContentFilter/ContentFilter.csproj', 'utf8');
            const csprojBlob = await github.rest.git.createBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: csprojContent,
              encoding: 'utf-8'
            });
            const pyprojectContent = fs.readFileSync('web/pyproject.toml', 'utf8');
            const pyprojectBlob = await github.rest.git.createBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: pyprojectContent,
              encoding: 'utf-8'
            });
            const baseCommit = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            const tree = await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: baseCommit.data.tree.sha,
              tree: [
                {
                  path: 'src/ContentFilter/ContentFilter.csproj',
                  mode: '100644',
                  type: 'blob',
                  sha: csprojBlob.data.sha
                },
                {
                  path: 'web/pyproject.toml',
                  mode: '100644',
                  type: 'blob',
                  sha: pyprojectBlob.data.sha
                }
              ]
            });
            const commit = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: `Bump version to ${{ steps.version.outputs.version }}`,
              tree: tree.data.sha,
              parents: [context.sha]
            });
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main',
              sha: commit.data.sha
            });
            core.setOutput('sha', commit.data.sha);

      - name: Use current SHA if no bump
        if: inputs.bump == 'no'
        run: echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-plugin:
    name: Build Plugin
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-version.outputs.sha || github.sha }}

      - name: Build plugin ZIP
        run: |
          docker build -f Dockerfile.build -o dist .

      - name: Rename artifact with version
        run: |
          VERSION="${{ needs.prepare-version.outputs.version }}"
          mv dist/ContentFilter.zip "dist/ContentFilter-${VERSION}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin-zip
          path: dist/*.zip

  build-python:
    name: Build Python Package
    needs: prepare-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-version.outputs.sha || github.sha }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build Tailwind CSS
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          ./tailwindcss-linux-x64 \
            -i technitium_content_filter/static/css/input.css \
            -o technitium_content_filter/static/css/styles.css \
            --minify
          rm tailwindcss-linux-x64

      - name: Build wheel and sdist
        run: uv build

      - name: Upload Python dist
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: web/dist/

  build-docker:
    name: Build Docker Image
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-version.outputs.sha || github.sha }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/technitium-content-filter-web
          tags: |
            type=raw,value=${{ needs.prepare-version.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.prepare-version.outputs.version, '-') }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest Docker image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/technitium-content-filter-web
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  test:
    name: Verify Build
    needs: [prepare-version, build-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-version.outputs.sha || github.sha }}

      - name: Build and run C# tests
        run: |
          docker build -f Dockerfile.test -t content-filter-tests .
          docker run --rm content-filter-tests

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run Python tests
        working-directory: web
        run: |
          uv sync --extra test
          uv run pytest tests/

  create-release:
    name: Create Release
    needs: [prepare-version, build-plugin, build-python, build-docker, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-version.outputs.sha || github.sha }}

      - name: Download plugin ZIP
        uses: actions/download-artifact@v8
        with:
          name: plugin-zip
          path: dist

      - name: Download Python dist
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Attest plugin ZIP
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/ContentFilter-*.zip

      - name: Attest Python packages
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/technitium_content_filter-*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare-version.outputs.version }}"
          TAG="v${VERSION}"

          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-alpha* ]] || [[ "$VERSION" == *-beta* ]] || [[ "$VERSION" == *-rc* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE_FLAG

  publish-pypi:
    name: Publish to PyPI
    needs: create-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download Python dist
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
