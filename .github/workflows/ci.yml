name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dotnet-test:
    name: C# Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build test image
        run: docker build -f Dockerfile.test -t content-filter-tests .

      - name: Run unit + property tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/coverage:/coverage \
            content-filter-tests \
            dotnet test --no-restore \
              --logger "console;verbosity=normal" \
              --settings /src/app/tests/coverlet.runsettings \
              --results-directory /coverage

      - name: Generate HTML coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          COV_FILE=$(find coverage -name "coverage.cobertura.xml" | head -1)
          if [ -n "$COV_FILE" ]; then
            dotnet tool install -g dotnet-reportgenerator-globaltool
            reportgenerator \
              -reports:"$COV_FILE" \
              -targetdir:coverage/htmlcov \
              -reporttypes:Html

            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$COV_FILE" | head -1)
            PCT=$(echo "$LINE_RATE * 100" | bc | xargs printf "%.0f")
            if [ "$PCT" -ge 90 ]; then COLOR="brightgreen";
            elif [ "$PCT" -ge 80 ]; then COLOR="green";
            elif [ "$PCT" -ge 70 ]; then COLOR="yellowgreen";
            else COLOR="red"; fi
            cat > coverage/coverage-badge.json << EOF
            {"schemaVersion":1,"label":"C# coverage","message":"${PCT}%","color":"${COLOR}"}
          EOF
          fi

      - name: Upload coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-coverage-report
          path: |
            coverage/htmlcov/
            coverage/coverage-badge.json
          if-no-files-found: ignore

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run unit, API, route, and property tests
        run: |
          uv run pytest tests/ --cov-report=html:htmlcov --cov-report=term-missing

      - name: Generate coverage badge JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          PCT=$(uv run python -c "
          import re, pathlib
          html = pathlib.Path('htmlcov/index.html').read_text()
          m = re.search(r'<span class=\"pc_cov\">(\\d+)%</span>', html)
          print(m.group(1) if m else '0')
          ")
          if [ "$PCT" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$PCT" -ge 80 ]; then COLOR="green";
          elif [ "$PCT" -ge 70 ]; then COLOR="yellowgreen";
          else COLOR="red"; fi
          cat > coverage-badge.json << EOF
          {"schemaVersion":1,"label":"Python coverage","message":"${PCT}%","color":"${COLOR}"}
          EOF

      - name: Upload coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage-report
          path: |
            web/htmlcov/
            web/coverage-badge.json
          if-no-files-found: ignore

  python-e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run e2e tests
        run: uv run pytest -m e2e --no-cov

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Ruff check
        run: uvx ruff check app.py tests/

      - name: Ruff format
        run: uvx ruff format --check app.py tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run mypy with HTML report
        run: uv run mypy --strict --html-report mypy-report app.py

      - name: Generate mypy badge JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMPRECISE=$(python3 -c "
          import re
          with open('mypy-report/index.html') as f:
              content = f.read()
          match = re.search(r'(\d+\.?\d*)% imprecise', content)
          print(match.group(1) if match else '0')
          ")
          IMPRECISE_INT=$(echo "$IMPRECISE" | cut -d. -f1)
          if [ "$IMPRECISE_INT" -le 1 ]; then COLOR="brightgreen";
          elif [ "$IMPRECISE_INT" -le 5 ]; then COLOR="green";
          elif [ "$IMPRECISE_INT" -le 10 ]; then COLOR="yellowgreen";
          else COLOR="yellow"; fi
          cat > mypy-report/mypy-badge.json << EOF
          {"schemaVersion":1,"label":"mypy","message":"${IMPRECISE}% imprecise","color":"${COLOR}"}
          EOF

      - name: Upload mypy report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: mypy-report
          path: web/mypy-report/
          if-no-files-found: ignore
