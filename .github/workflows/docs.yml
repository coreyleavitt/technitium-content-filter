name: Docs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install docs dependencies
        working-directory: web
        run: uv sync --group docs

      - name: Build docs
        working-directory: web
        run: uv run mkdocs build -f ../mkdocs.yml -d ${{ github.workspace }}/site

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs site
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: _site

      # Merge coverage badges from CI run if available
      - name: Download CI badges
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: badges
        continue-on-error: true

      - name: Merge badges into site
        run: |
          if [ -d badges ]; then
            find badges -name "*.json" -exec cp {} _site/ \;
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
      - id: deployment
        uses: actions/deploy-pages@v4
