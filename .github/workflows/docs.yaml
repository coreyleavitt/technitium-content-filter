name: Docs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install docs dependencies
        working-directory: web
        run: uv sync --group docs

      - name: Build docs
        working-directory: web
        run: uv run mkdocs build -f ../mkdocs.yml -d ${{ github.workspace }}/site

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs site
        uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: deploy/latest/

      # Download coverage reports from CI run
      - name: Download C# coverage report
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: dotnet-coverage-report
          path: deploy/reports/dotnet-coverage/
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download Python coverage report
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: python-coverage-report
          path: deploy/reports/python-coverage/
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download mypy report
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: mypy-report
          path: deploy/reports/mypy/
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Create reports index
        run: |
          mkdir -p deploy/reports
          cat > deploy/reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Content Filter Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
              h1 { color: #333; }
              a { display: block; padding: 15px; margin: 10px 0; background: #f5f5f5; border-radius: 8px; text-decoration: none; color: #0066cc; }
              a:hover { background: #e8e8e8; }
            </style>
          </head>
          <body>
            <h1>Content Filter Reports</h1>
            <a href="dotnet-coverage/htmlcov/">C# Test Coverage Report</a>
            <a href="python-coverage/htmlcov/">Python Test Coverage Report</a>
            <a href="mypy/">Type Check Report (mypy)</a>
          </body>
          </html>
          EOF

      - name: Create root redirect
        run: |
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=latest/"></head>
          <body><a href="latest/">Redirect to latest docs</a></body>
          </html>
          EOF

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: deploy/
      - id: deployment
        uses: actions/deploy-pages@v5
