version: 2
updates:
  - package-ecosystem: pip
    directory: /web
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: nuget
    directory: /src/ContentFilter
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
