site_name: Technitium Content Filter
site_url: https://coreyleavitt.github.io/technitium-content-filter/
repo_url: https://github.com/coreyleavitt/technitium-content-filter
repo_name: coreyleavitt/technitium-content-filter

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Web UI Setup: getting-started/web-ui.md
  - User Guide:
      - Profiles: guide/profiles.md
      - Clients: guide/clients.md
      - Blocklists: guide/blocklists.md
      - Allowlists: guide/allowlists.md
      - Blocked Services: guide/services.md
      - Custom Rules: guide/rules.md
      - DNS Rewrites: guide/rewrites.md
      - Schedules: guide/schedules.md
      - Base Profile: guide/base-profile.md
  - Architecture:
      - Overview: architecture/overview.md
      - Filtering Pipeline: architecture/filtering.md
      - Profile Compilation: architecture/compilation.md
  - Development:
      - Testing: development/testing.md
      - Contributing: development/contributing.md
  - Configuration Reference: reference.md
